name: Atualizar imóveis

on:
  schedule:
    - cron: "7 11 * * *"   # 08:07 BRT (11:07 UTC), diário
  workflow_dispatch:        # permite rodar manualmente pelo site do GitHub

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node scraper.js
      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/imoveis.json data/imoveis.js
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "Atualiza imóveis ($(date -u +%Y-%m-%d))"
            git push
          fi

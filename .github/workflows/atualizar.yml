name: Atualizar imóveis

# Wimoveis bloqueia o IP dos servidores do GitHub, então a coleta roda no Mac
# local (atualizar.sh + launchd) e dá push. Este workflow fica só manual.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node scraper.js
      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/imoveis.json data/imoveis.js
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "Atualiza imóveis ($(date -u +%Y-%m-%d))"
            git push
          fi
